name: FreeGameHost Auto Renew

on:
  schedule:
    - cron: '0 */6 * * *'     # 每6小时执行一次
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SeleniumBase
        run: |
          pip install seleniumbase pyvirtualdisplay

      - name: Run Renew Script
        env:
          FG_ACCOUNTS: ${{ secrets.FG_ACCOUNTS }}
          SERVER_IDS: ${{ secrets.SERVER_IDS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python renew.py
